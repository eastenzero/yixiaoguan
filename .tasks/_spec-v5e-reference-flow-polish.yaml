# ===================================================================
# 医小管 (YiXiaoGuan) — T0 架构师需求规格 v5e
# 日期: 2026-04-07
# 作者: T0 Architect (Cascade)
# 状态: ready_for_t1
# 前置: spec-v5d (completed), v5c push (3397994)
# ===================================================================
#
# 背景:
#   v5d 实现了"点击参考来源 → 直接打开全量 PDF"的一级跳转，
#   但用户明确要求的是 **两级导航**：
#     一级：点击来源 → 知识详情页（KB 条目的 MD 渲染，完整文本预览）
#     二级：知识详情页 → "查看原始文件" → 裁剪后的 PDF（仅相关页码）
#
#   当前问题：
#   1. handleSourceClick 中 normalizeEntryId 只接受数字 ID，
#      但 ChromaDB entry_id 为字符串（如 "KB-20260323-0001__chunk_0"），
#      导致一级跳转永远失败 → 降级到弹层。
#   2. 知识详情页 loadDetail() 直接标记 loadFailed=true，不调 API，
#      只展示 URL 参数传入的 chunk 摘要（碎片）。
#   3. 没有后端 API 提供完整 KB 条目内容。
#   4. PDF 全量加载 182 页，无页码裁剪。
#   5. 残留 CSS DEBT（卡片溢出、弹层遮挡、硬编码颜色）。
#
# 已关闭的 DEBT:
#   - DEBT-V5A-02 (验证码 500): 用户确认已修复 → closed
# ===================================================================

project: 医小管 (YiXiaoGuan)
version: spec-v5e
date: 2026-04-07
author: T0-Architect
status: ready_for_t1

# ===================================================================
# 核心交互流程（目标状态）
# ===================================================================
#
#   [聊天页] 点击参考来源卡片
#     │
#     ▼
#   [知识详情页] /pages/knowledge/detail?entry_id=KB-xxx
#     ├── 顶部 Hero 卡: 标题 + 相关度 + 分类标签
#     ├── 正文区: 完整 KB 条目 Markdown 渲染（全文，非 chunk 碎片）
#     ├── 底部按钮: "查看原始文件"（仅当 material_file_url 存在时显示）
#     │     │
#     │     ▼
#     │   [PDF 预览页] /pages/viewer/pdf?url=xxx&page=42&title=xxx
#     │     └── 浏览器 PDF 阅读器，自动跳转到相关页码
#     │
#     └── 降级: 如果 API 加载失败 → 显示 chunk 摘要（fallback，同当前行为）
#
# ===================================================================

