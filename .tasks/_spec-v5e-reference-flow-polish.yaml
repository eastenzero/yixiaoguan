# ===================================================================
# 风险
# ===================================================================
risks:
  - id: RISK-1
    description: |
      ChromaDB 不支持 ID 前缀查询（WHERE id LIKE 'KB-xxx%'）。
      解决: ChromaDB 的 get() 方法支持传入 IDs 列表，
      可先 get(where={"entry_id": base_id}) 或遍历。
      或者降级到直接读取 .md 文件（更简单可靠）。
  - id: RISK-2
    description: |
      知识条目 .md 文件路径与 entry_id 的映射不确定。
      KB 文件命名格式: KB-0150-电费缴纳指南.md
      chunk ID 格式: KB-0150-电费缴纳指南__chunk_0
      → base_entry_id = "KB-0150-电费缴纳指南" = 文件名（去 .md 后缀）
      → 可直接拼接路径读取文件。
  - id: RISK-3
    description: |
      H5 环境 web-view 可能不支持 PDF #page=N fragment。
      解决: 如果不支持，降级为不带 fragment 的 URL（全量展示）。
      长期方案: 后端 pypdf 切片。
