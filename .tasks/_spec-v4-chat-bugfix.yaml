# ===================================================================
# 已知风险
# ===================================================================
risks:
  - id: RISK-1
    title: ":deep() 在 uni-app H5 模式下的兼容性"
    description: |
      uni-app 底层编译器可能对 :deep() 的处理与标准 Vue 3 不同。
      如果 :deep() 不生效，备选方案是将 .markdown-body 样式
      移至独立的 <style>（不加 scoped）块。
    probability: low
    impact: high
    mitigation: "FIX-A 优先尝试 :deep()，不生效则改用 unscoped style"

  - id: RISK-2
    title: "BUG-5 根因可能不只是字段映射"
    description: |
      除字段映射外，/api/v1/classroom-applications 端点在后端可能
      未注册或权限配置不匹配，导致直接返回 401/403。
      如果 FIX-D 修复字段映射后问题仍存在，需进一步排查后端。
    probability: medium
    impact: medium
    mitigation: "FIX-D 完成后先验证 userInfo.id 有值；若仍 401 则上报 T0"

