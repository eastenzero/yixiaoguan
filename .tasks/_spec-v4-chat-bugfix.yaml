# ===================================================================
# Bug 清单 + T0 根因分析
# ===================================================================
bugs:

  - id: BUG-1
    title: "空状态双层 header — 输入框被挤出屏幕"
    severity: medium
    screenshot: "130"
    symptom: |
      进入智能问答页面时，顶部出现 "AI 咨询"（原生导航栏）+
      "医小管"（自定义 .navbar）双层 header，导致内容区被大幅下推，
      输入框在部分机型上完全不可见，需手动下滑。
    root_cause: |
      pages.json 第 19 行:
        "path": "pages/chat/index",
        "style": { "navigationBarTitleText": "AI 咨询" }
      渲染了 uni-app 原生导航栏（高度 ~44px + 状态栏）。
      同时 chat/index.vue 第 4-6 行自行渲染了 .navbar 组件
      （又占 44px + padding-top: var(--status-bar-height, 44px)）。
      两者叠加导致 header 总高度约 132px+，在小屏设备上空状态区域 +
      输入框总高度超过 100vh。
    files:
      - "apps/student-app/src/pages.json:17-21"
      - "apps/student-app/src/pages/chat/index.vue:4-6 (custom navbar)"
      - "apps/student-app/src/pages/chat/index.vue:786-801 (navbar style)"
    fix_direction: |
      方案: 在 pages.json 中为 chat 页面设置 "navigationStyle": "custom"，
      禁用原生导航栏，仅保留自定义 .navbar。
      同时可考虑将 .navbar 标题从 "医小管" 改为 "智能问答"，
      与 TabBar 文字保持一致。

  - id: BUG-2
    title: "AI 气泡高度只有一行 — 回复内容被截断"
    severity: critical
    screenshot: "127, 128"
    symptom: |
      AI 回复气泡永远只显示一行文字，长回复被截断不可见。
      这是 s3-hotfix-bubble-height 已尝试修复但未生效的问题。
    root_cause: |
      s3-hotfix-bubble-height 修改了 .message-content 和 .message-text
      的 flex/min-height 属性，代码已合入（line 915-921, 951-955），
      但问题依然存在。

      真正根因: <style lang="scss" scoped> 与 v-html 的兼容性问题。
      chat/index.vue 第 65-69 行:
        <view class="message-text markdown-body" v-html="renderMarkdown(msg.content)"></view>

      Vue 3 scoped CSS 编译规则:
        .markdown-body p { ... }
        → .markdown-body p[data-v-xxxxx] { ... }

      但 v-html 动态插入的 <p>/<ul>/<li> 等元素不会携带 [data-v-xxxxx]
      属性，因此 .markdown-body 下所有子元素样式全部失效。
      没有样式的 HTML 元素在 flex 布局中行为异常，导致气泡高度坍塌为一行。

      证据: chat/index.vue 第 958-1010 行的 .markdown-body 子选择器
      （p, h1, h2, ul, li, code, pre, a, blockquote）全部在 scoped
      样式块内，未使用 :deep() 穿透。
    files:
      - "apps/student-app/src/pages/chat/index.vue:65-69 (v-html template)"
      - "apps/student-app/src/pages/chat/index.vue:958-1010 (scoped .markdown-body styles)"
    fix_direction: |
      将 .markdown-body 的子元素选择器改为 :deep() 穿透，例如:
        .markdown-body { :deep(p) { margin: 0 0 8px 0; } }
      或将 .markdown-body 相关样式移至单独的 <style> 块（不加 scoped）。
      推荐前者，影响面更小。

  - id: BUG-3
    title: "知识详情页显示'暂不可用' — 降级为摘要展示"
    severity: medium
    screenshot: "125"
    symptom: |
      点击来源引用跳转到参考资料页后，显示 "知识详情暂不可用，
      已为你展示引用摘要。"
    root_cause: |
      knowledge/detail.vue 第 106 行调用:
        entry.value = await getKnowledgeEntryDetail(entryId.value)
      对应 API: GET /api/v1/knowledge/entries/{id}

      该 API 在后端未实现，请求必然失败 → loadFailed=true
      → 展示 fallback notice + fallbackSummary。

      当前 fallback 逻辑（第 19-21 行）只是显示一条提示文字，
      然后在 v-else 分支（第 24-26 行）以纯 <text> 显示 summary。
    files:
      - "apps/student-app/src/pages/knowledge/detail.vue:98-114 (loadDetail)"
      - "apps/student-app/src/api/knowledge.ts:7-9 (API endpoint)"
      - "apps/student-app/src/pages/knowledge/detail.vue:19-26 (fallback template)"
    fix_direction: |
      前端侧修复（不依赖后端 API）:
      1. 当 loadFailed 且有 fallbackSummary 时，将 summary 内容
         通过 md.render() 渲染为 HTML，而不是用纯 <text> 展示。
      2. 即：fallback 分支也使用 v-html + markdown-body 样式。
      3. 同时需解决与 BUG-2 相同的 scoped/:deep() 问题。
      4. 可选：将 fallback notice 文案从"暂不可用"改为更友好的措辞，
         或在有内容可展示时隐藏该提示。

  - id: BUG-4
    title: "参考资料页 Markdown 渲染失效 — 原始标记裸露"
    severity: medium
    screenshot: "125"
    symptom: |
      参考资料页下方的内容区显示原始 Markdown 标记
      （# Document, - 列表符号等），未渲染为格式化 HTML。
    root_cause: |
      与 BUG-3 同源。API 失败后走 v-else 分支 (line 24-26):
        <view v-else class="detail-card plain-content">
          <text>{{ displaySummary || '暂无可展示内容' }}</text>
        </view>
      displaySummary 来自 URL 参数 fallbackSummary，是原始 Markdown
      文本，但以纯 <text> 输出，自然不会渲染。

      此外，即使走到 v-if="renderedContent" 的 v-html 分支，
      knowledge/detail.vue 的 .markdown-body 样式同样在 scoped 块内
      （line 212-275），存在与 BUG-2 相同的 :deep() 缺失问题。
    files:
      - "apps/student-app/src/pages/knowledge/detail.vue:24-26 (plain-content branch)"
      - "apps/student-app/src/pages/knowledge/detail.vue:68-71 (renderedContent computed)"
      - "apps/student-app/src/pages/knowledge/detail.vue:212-275 (scoped markdown-body)"
    fix_direction: |
      修复 BUG-3 时一并解决:
      1. fallback 分支渲染 md.render(fallbackSummary) 而非纯文本
      2. .markdown-body 子选择器加 :deep() 穿透
      与 BUG-3 合并为同一个修复任务。

  - id: BUG-5
    title: "我的申请页面'未登录'跳转回登录页"
    severity: medium
    screenshot: "用户口述"
    symptom: |
      已登录状态下点击进入"我的申请"（事务导办 → 空教室申请状态页），
      页面显示"登录已过期"并跳转回登录页。
    root_cause: |
      高度疑似: 登录后 /getInfo 响应字段名不匹配。

      login/index.vue 第 146-148 行:
        const ruoyiUser = userInfoRes.user
        userStore.setUserInfo({ id: ruoyiUser.userId, ... })

      但后端 yx_user 版本的 /getInfo 返回 (fix-3 报告证据):
        { "user": { "id": 10, "username": "2524010001", ... } }

      字段名是 "id" 而非 "userId"，"username" 而非 "userName"。
      因此 userStore.userInfo.id = undefined。

      apply/status.vue 第 246 行:
        const res = await getMyApplications(userStore.userInfo.id, ...)
      → getMyApplications(undefined, ...) → 请求 applicantId=undefined
      → 后端返回错误 → request.ts 第 95-104 行 401 处理器触发
      → userStore.logout() + 跳转登录页。

      auth.ts 第 54-63 行的 UserInfoResult 接口定义仍用 RuoYi 旧字段名:
        user: { userId: number, userName: string, nickName: string }
      需同步更新。
    files:
      - "apps/student-app/src/pages/login/index.vue:146-157 (field mapping)"
      - "apps/student-app/src/api/auth.ts:54-63 (UserInfoResult type)"
      - "apps/student-app/src/pages/apply/status.vue:246 (userInfo.id usage)"
    fix_direction: |
      更新 login/index.vue 的字段映射，兼容 yx_user 版 /getInfo 响应:
        id: ruoyiUser.id ?? ruoyiUser.userId
        username: ruoyiUser.username ?? ruoyiUser.userName
        realName: ruoyiUser.realName ?? ruoyiUser.nickName ?? ...
      同步更新 auth.ts 的 UserInfoResult 类型定义。

