#
# 背景摘要:
#   项目是校园 AI 助手，核心功能两个：
#   1. 基于知识库的高度定制化校园信息问答
#   2. 基于对话内容的智能功能入口推荐（路由）
#
#   当前问题：AI 回答不准确（早期严重幻觉，修复后勉强可答但缺乏针对性）
#   根因：知识库数据质量差 + 覆盖面窄 → 向量化质量差 → RAG 回答不靠谱 → 智能路由也失效
#   代码层面（ai-service RAG 管道、business-api 网关、student-app 前端）工程质量可以，
#   问题在数据，不在代码。
#
# 修复策略: 自底向上，每层修好后验证再往上走
# ===================================================================

