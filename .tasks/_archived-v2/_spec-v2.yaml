# ===================================================================
# 执行计划
# ===================================================================
execution_order:
  phase_1_verify:
    name: "验证 — 数据现状 + 格式统一"
    goals: [F-L0-G1, F-L0-G2]
    estimated_effort: "1 天"
    parallelizable_with: [phase_1b_fallback]

  phase_1b_fallback:
    name: "兜底 — 办事意图官网链接（可并行）"
    goals: [F-L3-G1]
    estimated_effort: "1-2 小时"
    parallelizable_with: [phase_1_verify]
    note: "改造成本极低，独立于数据治理，可立即动手"

  phase_2_rebuild:
    name: "重建 — 向量化管道 + 重入库"
    goals: [F-L1-G1, F-L1-G2]
    estimated_effort: "1-2 天"

  phase_3_tune:
    name: "调优 — 检索质量 + 人工抽查"
    goals: [F-L2-G1, F-L2-G2, F-L0-G3]
