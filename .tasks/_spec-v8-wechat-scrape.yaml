# ===================================================================
# T1 执行指南
# ===================================================================
#
# 1. 关键依赖:
#    - Docker (服务器或本地)
#    - 用户的微信公众号（扫码登录用）
#    - auth-key（有效期 4 天，过期需用户重新扫码）
#
# 2. API 速查:
#    Base URL: http://localhost:3000
#    认证 Header: X-Auth-Key: {key}
#
#    搜索公众号:  GET /api/public/v1/account?keyword=xxx
#    文章列表:    GET /api/public/v1/article?fakeid=xxx&begin=0&size=20
#    下载文章:    GET /api/public/v1/download?url=xxx&format=markdown
#    验证密钥:    GET /api/public/v1/authkey
#
# 3. 自动化建议:
#    T1 可编写 Python 辅助脚本:
#    - scripts/wechat/discover_accounts.py  — 搜索并列出公众号
#    - scripts/wechat/sync_articles.py      — 同步文章列表
#    - scripts/wechat/download_articles.py  — 筛选+批量下载
#    - scripts/wechat/triage_articles.py    — 内容分类
#    这些脚本可复用，后续定期更新 KB 时再次使用。
#
# 4. 注意事项:
#    - auth-key 4 天过期，长时间任务注意续期
#    - 微信接口有频率限制，同步大号文章时注意间隔
#    - 文章内容版权归原作者，仅用于内部知识库
#    - 某些公众号可能关闭搜索功能，搜不到属正常
#    - 下载的 Markdown 可能含图片链接，KB 条目中
#      只需保留文字信息，图片链接可去除
#
# ===================================================================
