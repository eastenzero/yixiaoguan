modules:

  # ─────────────── A 层：遗留技术债 ───────────────

  - id: F-V4-01
    name: "知识详情页 API 对接"
    origin: "spec-v3 遗留 t1-15"
    priority: P0
    description: |
      knowledge/detail.vue 当前走 fallback（API 404 → 展示 route query 中的摘要）。
      后端 GET /api/v1/knowledge/entries/{id} 已实现，需前端对接：
      1. 修复 getKnowledgeEntryDetail 调用，正确处理 AjaxResult 响应包装
      2. 成功时渲染完整知识条目（标题 + markdown 正文 + 标签）
      3. 失败时保留现有 fallback 行为
    scope:
      - pages/knowledge/detail.vue
      - api/knowledge.ts
    out_of_scope:
      - 后端接口修改
      - 其他页面
    verification:
      L0: "TypeScript 编译无错误"
      L1: "getKnowledgeEntryDetail 函数调用格式正确"
      L2: "H5 预览：从 AI 回复来源点击进入详情页，显示完整条目内容"
    depends_on: []

  - id: F-V4-02
    name: "主题色 Token 统一"
    origin: "spec-v3 DEBT-V3-01"
    priority: P1
    description: |
      将 11 个文件中的 23 处 #006a64 内联硬编码替换为 theme.scss 中的
      $primary 或对应语义 token 引用。
    scope:
