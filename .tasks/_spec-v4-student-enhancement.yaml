# ===================================================================
# 医小管 (YiXiaoGuan) — T0 架构师需求规格 v4
# 日期: 2026-04-06
# 作者: T0 Architect (Cascade)
# 状态: completed  # T0 签收 2026-04-06 14:15
# 前置: spec-v3 (completed), spec-v4-chat-bugfix (hotfix merged)
# ===================================================================
#
# 背景摘要:
#   spec-v3 完成了学生端 UI 重做（对话/首页/事务导办/个人中心）。
#   spec-v4-chat-bugfix 修复了 5 个阻塞性 bug（BUG-1~5），其中 BUG-2
#   的真正根因（SSE chunk 契约不匹配）由 T0 直接 hotfix。
#   现在进入"功能补全 + 质量提升"阶段：清理遗留技术债、对接已有后端 API、
#   新增聊天历史功能、扩充知识库覆盖面。
#
# 目标:
#   1. 清理 spec-v3 遗留技术债 (A1/A2/A3)
#   2. 聊天历史记录功能 (B1) — 后端 API 已就绪，需前端对接
#   3. 来源引用点击闭环增强 (B2) — 依赖 A1
#   4. 快捷问题动态化 (B3)
#   5. 知识库扩量 (C1) — 补齐生活化高频问题
#   6. AI 防幻觉端到端验证 (C2)
#   7. 事务导办统计卡片真实数据 (D3)
#
# 约束:
#   - 不新增后端 Java 接口（全部已在模块 1-5 中实现）
#   - 前端通道任务之间禁止写同一文件（并行安全）
#   - KB 通道与前端通道完全独立，可全程并行
# ===================================================================

