      - AC-KG0-02: 大创项目条目包含申报条件和流程
      - AC-KG0-03: 研究生招生条目包含时间节点
      - AC-KG0-04: 与 v6 已有 KB（KB-20260409-0073~0074 考研保研）内容互补不重复

  # ────────────────────────────────────────────────────────────────
  # KB-GEN-COLLEGES: 学院 KB 批量生成
  # ────────────────────────────────────────────────────────────────
  - id: KB-GEN-COLLEGES
    title: "KB 生成 — 21 个学院汇总"
    priority: P1
    estimated_effort: 3h
    depends_on: [EXPLORE-B1, EXPLORE-B2, EXPLORE-B3, EXPLORE-B4, EXPLORE-B5, EXPLORE-B6, EXPLORE-B7]
    description: |
      基于 report-11 ~ report-17（7 份学院探查报告）批量生成 KB 条目。

      === KB 条目类型（每个学院按需生成 2-5 条）===

      A. 学院概况与专业（每学院 1 条，共 ~21 条）
         - 标题格式: "XX学院简介与专业设置"
         - 内容: 学院简介、本科专业列表、硕博点、特色专业、所属校区
         - category: 院系与专业

      B. 学院联系方式（合并为 1-2 条汇总表）
         - 标题: "各学院联系电话汇总（济南校区）""各学院联系电话汇总（泰安校区）"
         - 内容: 按校区汇总所有学院办公电话/邮箱
         - category: 证件与校园服务

      C. 学院特色内容（按需，约 10-15 条）
         - 实验室/研究平台（对学生有直接使用价值的）
         - 实习基地与临床教学安排
         - 国际交流/联合培养项目
         - 学院特色竞赛/活动
         - category: 按内容归入 科研与创新 / 竞赛与第二课堂 / 招生与深造

      D. 继续教育/国际教育专项（约 3-5 条）
         - 成人高考报名指南
         - 自考本科说明
         - 留学生招生流程
         - 出国交流项目一览
         - category: 招生与深造

      === 预估总量: 35-45 条 ===
      === 编号范围: KB-20260410-0024 ~ KB-20260410-0068 ===

      === 去重规则 ===
      - 与 v6 KB-20260409-0069（学校简介）互补，学院级别更细化
      - 与 v6 KB-20260409-0071~0072（专业/学科）互补，学院级别更详细
      - 继续教育条目与 v6 KB-20260409-0080 去重

    output_dir: knowledge-base/entries/first-batch-drafts/
    naming: "KB-20260410-{NNNN}.md"
    id_range: "0024-0068"

    dedup_check_against:
      - KB-20260409-0069  # 学校简介
      - KB-20260409-0070  # 校区分布
      - KB-20260409-0071  # 本科招生专业
      - KB-20260409-0072  # 优势学科
      - KB-20260409-0080  # 继续教育

    acceptance_criteria:
      - AC-KGC-01: 生成 35-45 个 .md 文件
      - AC-KGC-02: 21 个学院至少各有 1 条学院概况+专业 KB
      - AC-KGC-03: 联系方式汇总表按校区分类
      - AC-KGC-04: 与 dedup_check_against 列表无实质重复

  # ════════════════════════════════════════════════════════════════
  # PHASE 3: 质量审查 + 入库 + 评测
  # ════════════════════════════════════════════════════════════════

  - id: QA-REVIEW-V7
    title: "质量审查 — frontmatter 校验 + 去重 + 内容质量"
    priority: P0
    estimated_effort: 1h
    depends_on: [KB-GEN-P0, KB-GEN-COLLEGES]
    description: |
      对所有 KB-20260410-* 文件进行质量审查。

      === 检查项（与 v6 一致）===
      1. frontmatter 完整性: title, category, tags, source, status
      2. category 在枚举列表中（含 v7 新增的 3 个分类）
      3. tags 至少 2 个
      4. "标准答复"段落存在且不少于 50 字
      5. 无幻觉内容
      6. 新增条目之间无重复
      7. 与 v6 及更早的 KB 无实质重复
      8. 编号连续无跳号

      === 输出 ===
      kimi/qa-review-v7-report.md

    acceptance_criteria:
      - AC-QAV7-01: 审查报告存在且覆盖所有新条目
      - AC-QAV7-02: frontmatter 校验 100% 通过
      - AC-QAV7-03: 无重复条目
      - AC-QAV7-04: 编号连续无跳号

  - id: INGEST-V7
    title: "ChromaDB 全量重入库"
    priority: P0
    estimated_effort: 0.5h
    depends_on: [QA-REVIEW-V7]
    description: |
      QA 通过后，在 165 服务器上执行全量重入库。

      === 步骤 ===
      1. 确保所有新 KB 文件已同步 (Mutagen)
      2. 停止 ai-service
      3. 清空 ChromaDB 旧数据
      4. 全量入库: python scripts/batch_ingestion.py --yes
      5. 验证入库数量
      6. 重启 ai-service
      7. GET /kb/stats 确认

      === 预期 ===
      入库总量: 现有 ~210 + v7 新增 ~55-68 = ~265-278 条
      chunks: ~400+ (按 800 字/chunk)

    acceptance_criteria:
      - AC-ING7-01: batch_ingestion.py 运行无异常
      - AC-ING7-02: /kb/stats entry_count ≥ 260
      - AC-ING7-03: 抽查 5 条 KB-20260410-* metadata 正确

  - id: RAG-EVAL-V7
    title: "RAG 评测 — 扩充评测集 + 回归测试"
    priority: P1
    estimated_effort: 1h
    depends_on: [INGEST-V7]
    description: |
      入库完成后验证 RAG 质量。

      === 新增测试问题（覆盖 v7 新内容）===
      - "大创项目怎么申报？" → 期望命中大创申报 KB
      - "研究生招生什么时候报名？" → 期望命中研招 KB
      - "药学院有哪些专业？" → 期望命中药学院专业 KB
      - "护理学院在哪个校区？" → 期望命中护理学院概况 KB
      - "怎么联系眼科学院？" → 期望命中学院联系方式 KB
      - "有哪些出国交流项目？" → 期望命中国际教育 KB
      - "推免保研需要什么条件？" → 期望命中推免政策 KB
      - "成人高考怎么报名？" → 期望命中继续教育 KB

      === 回归基线 ===
      v6 最终: Recall@5 = 80%, 拒答 = 100%

    acceptance_criteria:
      - AC-EVAL7-01: 评测集新增 8-10 题
      - AC-EVAL7-02: 整体 Recall@5 ≥ 80%
      - AC-EVAL7-03: 原有题目 Recall 不退化
      - AC-EVAL7-04: 拒答准确率 = 100%

