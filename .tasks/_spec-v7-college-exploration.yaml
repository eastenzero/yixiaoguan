#   kimi/report-9-college-index.md    — 21个教学机构子站点索引 (45行)
#
# 现有知识库规模:
#   first-batch-drafts/KB-0150~0171   — 22 条 (第一批)
#   first-batch-drafts/KB-20260324-*  — ~104 条 (第二批)
#   first-batch-drafts/KB-20260409-*  — 84 条 (v6 新增)
#   合计: ~210 条, ~300 chunks (ChromaDB)
#
# ===================================================================

