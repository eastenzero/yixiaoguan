# ===================================================================
# 整体策略
# ===================================================================
#
# 本轮分为两大阶段:
#
# PHASE 1 — 深度探查 (Kimi CLI)
#   对每个站点用 Kimi 进行深度网页探查，产出结构化报告。
#   21 个学院站点按 3 个一组分为 7 个探查批次。
#   3 个高优独立站点作为第 0 批次优先探查。
#   共 8 个探查批次，每批次产出 1 份 report。
#
# PHASE 2 — KB 生成 (Kimi CLI)
#   基于 PHASE 1 产出的报告，批量生成 KB 条目。
#   与 v6 相同的 frontmatter 格式和质量标准。
#
# PHASE 3 — QA + 入库 + 评测
#   质量审查 → ChromaDB 重入库 → RAG 回归验证。
#
# ===================================================================

# ===================================================================
# 学院站点探查标准模板
# ===================================================================
#
# 每个学院网站的 Kimi 探查任务应提取以下信息:
#
# 1. 学院基本信息
#    - 学院全称、英文名
#    - 院长/书记（如公开）
#    - 联系方式（电话、邮箱、地址）
#    - 所属校区（济南/泰安）
#
# 2. 专业设置
#    - 本科专业列表（名称、学制、学位）
#    - 硕士/博士点（如有）
#    - 国家级/省级一流专业、特色专业
#
# 3. 导航菜单结构
#    - 完整列出一级/二级菜单及 URL
#
# 4. 学生相关内容（重点）
#    - 培养方案/教学计划
#    - 实习实践安排
#    - 学生活动/竞赛/社团
#    - 就业去向/深造率
#    - 奖学金/荣誉
#
# 5. 通知公告（最近 5 条标题，判断活跃度）
#
# 6. 特色内容
#    - 实验室/研究平台
#    - 产教融合/校企合作
#    - 国际交流项目
#
# ===================================================================

# ===================================================================
