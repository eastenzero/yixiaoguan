    - AC-A02: 教师端无 #00685f 硬编码（除注释）
    - AC-A03: 教师端登录页/侧边栏/导航栏/按钮均紫色
    - AC-A04: Element Plus 组件主题色紫色
    - AC-A05: 学生聊天页面有"呼叫老师"按钮
    - AC-A06: 点击呼叫 → 调 API → 按钮变等待态
    - AC-A07: 消息列表出现系统提示
    - AC-A08: 已呼叫状态不可重复点击
    - AC-A09: yx_user ≥ 28 条
    - AC-A10: 新账号有 yx_user_role
    - AC-A11: 2 个新学生账号可登录
    - AC-A12: 1 个新教师账号可登录
  phase_b:
    - AC-B01~B07: 教师介入对话端到端闭环
  phase_c:
    - AC-C01~C06: 教师移动端 MVP

# ===================================================================
# 执行顺序
# ===================================================================
execution_order:
  phase_a_parallel:
    - F-V6A-01 (教师端换紫色, 独立, 无依赖)
    - F-V6A-02 (呼叫老师按钮, 独立, 无依赖)
    - F-V6A-03 (批量测试账号, 独立, 无依赖)
  phase_b:
    - F-V6B-01 (教师介入联调, 依赖 F-V6A-02)
  phase_c:
    - F-V6C-01 (教师移动端, 依赖 F-V6B-01)

# ===================================================================
# 风险
# ===================================================================
risks:
  - id: RISK-V6-01
    description: |
      后端 WebSocket 实现可能不完整或有 bug。
      ConversationHandler 的 TEACHER_JOIN/MESSAGE/LEAVE 需要实际测试。
      缓解: Phase B 开始时先用 Postman/wscat 单独测试 WebSocket 端点。
  - id: RISK-V6-02
    description: |
      学生端 UniApp H5 环境 WebSocket 兼容性。
      uni.connectSocket 在 H5 模式下应等同于原生 WebSocket，但需验证。
      缓解: 如 WebSocket 不可靠，降级为短轮询（每 3 秒查一次新消息）。
  - id: RISK-V6-03
    description: |
      教师移动端无设计参考图，UI 质量依赖开发者审美。
      缓解: 参考学生端风格 + Material Design 3 移动端规范。
  - id: RISK-V6-04
    description: |
      教师端换色可能遗漏深层组件（Element Plus 弹窗、表格等）。
      缓解: 换色后全页面截图审查。
