  - "TabBar 四项：首页 / 智能问答 / 事务导办 / 我的"
  - "AI 对话页面空状态、气泡、来源引用样式符合参考设计方向"
  - "事务导办页面展示服务入口矩阵，空教室申请可正常跳转"
