# ===================================================================
# 医小管 (YiXiaoGuan) — T0 架构师需求规格 v3
# 日期: 2026-04-04
# 作者: T0 Architect (Cascade)
# 状态: 用户已确认方向，待 T1 分解
# 前置: spec-v2 全部交付完成（T0 校验通过）
# ===================================================================
#
# 背景摘要:
#   spec-v2 解决了 AI 回答质量问题（KB 格式化 → chunker → 阈值调优 → Recall@5=92.86%）。
#   现在进入"可展示性"阶段：项目处于计划书落地期，需要向学校展示可用性。
#   学生端 AI 对话界面过于简陋，与参考设计差距大；第 3 个 Tab 仅有空教室申请占位。
#
# 目标:
#   1. AI 对话 UI 重做（核心）— 按参考设计 Screen _1 标准重做样式
#   2. "事务导办" Tab 新建 — 替代原"申请"Tab，服务大厅展示
#   3. 首页样式升级 — 按参考设计 Screen _8 标准升级
#   4. 主题一致性修复 — 统一 teal 色系，品牌名统一为"医小管"
#   5. 个人中心微调 — 品牌名修正 + 数据清理
#
# 约束:
#   - 仅做界面展示，不新增后端接口
#   - 未对接的功能点击后显示"功能开发中，敬请期待"
#   - 保持所有已有功能不变（SSE 流式、来源引用、空教室申请等）
#   - 品牌名全部使用"医小管"，不使用"学术亭"/"学术助手"
# ===================================================================

