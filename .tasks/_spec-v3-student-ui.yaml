# ===================================================================
# 技术债（本轮顺带清理）
# ===================================================================
tech_debt:
  - id: DEBT-V3-01
    title: "theme.scss primary 色阶与页面内联重复"
    description: "统一后删除各页面 <style> 内的 $primary 重复声明"
    severity: medium
    phase: F-S1 附带处理

  - id: DEBT-V3-02
    title: "CustomTabBar 英文标签"
    description: "labels 从 Home/Assistant/Services/Profile → 首页/智能问答/事务导办/我的"
    severity: low
    phase: F-S2 附带处理

  - id: DEBT-V3-03
    title: "chat/index.vue history:[] 残留"
    description: "前端仍发送空 history 数组，后端已从 DB 取历史。前端清理此冗余字段。"
    severity: low
    phase: F-S3 附带处理

# ===================================================================
# 风险登记
# ===================================================================
risks:
  - id: RISK-V3-01
    title: "uni-app custom tabBar 兼容性"
    description: |
      pages.json 有 "custom": true 但页面未引用 CustomTabBar 组件。
      可能在 H5 模式下仍显示原生 tabBar。需要确认 tabBar 渲染机制，
      若 custom tabBar 不生效则回退为修改原生 tabBar 配置。
    probability: medium
    impact: medium
    mitigation: "F-S2 任务中先验证 custom tabBar 是否生效，不生效则直接用原生配置"

  - id: RISK-V3-02
    title: "chat/index.vue 样式重写范围大"
    description: |
      chat 页面 1371 行，其中 ~600 行是 <style>。大面积样式重写风险较高。
      需要分段验证，避免破坏已有功能。
    probability: low
    impact: high
    mitigation: "仅修改样式层，不动 <script> 逻辑；每改一块验证一块"

  - id: RISK-V3-03
    title: "apply/status 从 tabBar 降级后路由影响"
    description: |
      apply/status 原为 tabBar 页面（switchTab 跳转），
      降级后需改为 navigateTo。所有引用 switchTab apply/status 的地方需排查修改。
    probability: high
    impact: medium
    mitigation: "全局搜索 switchTab.*apply/status，逐一改为 navigateTo"

# ===================================================================
# 执行顺序建议（给 T1 Coordinator）
# ===================================================================
execution_order:
  phase_1:
    tasks: [F-S1, F-S2]
    name: "地基：主题统一 + 路由重构"
    rationale: "所有 UI 改动的前置依赖"

  phase_2:
    tasks: [F-S4]
    name: "事务导办页面"
    rationale: "新建页面，不影响现有页面，可独立验证"

  phase_3:
    tasks: [F-S3]
    name: "AI 对话 UI 重做"
    rationale: "核心交付物，需要主题统一后才能正确使用 token"

  phase_4:
    tasks: [F-S5, F-S6]
    name: "首页 + 个人中心收尾"
    rationale: "依赖路由重构完成后才能修正跳转逻辑"

