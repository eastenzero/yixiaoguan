# ===================================================================
# 地基模块定义
# ===================================================================
foundation_modules:

  - id: F-S1
    name: "主题色系统一 (Theme Unification)"
    description: |
      将 theme.scss 的 primary 色阶从蓝色 (#00639B) 替换为 teal (#006a64) 基准，
      确保所有页面 import theme.scss 后不再需要内联覆盖 $primary。
      同时新增参考设计所需的语义 token（surface 层级色、glass 背景等）。
    priority: P0-FOUNDATION
    reason: "所有 UI 改动依赖统一的色彩 token，必须先修"
    scope:
      - styles/theme.scss
    out_of_scope:
      - 页面内联样式迁移（由各页面任务自行处理）

  - id: F-S2
    name: "TabBar 路由重构"
    description: |
      1. pages.json: 第 3 个 tab 从 pages/apply/status 改为 pages/services/index，
         text 从"申请"改为"事务导办"，第 2 个 tab text 从"咨询"改为"智能问答"。
      2. 新增 pages/services/index 路由注册。
      3. CustomTabBar.vue: labels 从英文改为中文（首页/智能问答/事务导办/我的）。
      4. apply/status 不再是 tabBar 页面，改为 navigateTo 跳转。
    priority: P0-FOUNDATION
    reason: "路由结构影响所有页面跳转逻辑"
    scope:
      - pages.json
      - components/CustomTabBar.vue
    depends_on: []

