    depends_on: [F-S1]
    scope:
      - pages/chat/index.vue
    out_of_scope:
      - SSE 逻辑变更
      - 后端接口变更
    changes:
      brand:
        - '"学术助手" → "医小管"'
        - '"学术亭智能助手" → "医小管智能助手"'
        - '"同学你好！我是学术亭智能助手。" → "同学你好！我是医小管智能助手。"'
      navbar:
        - '标题 "AI 助手" → "医小管"'
        - "毛玻璃效果保留，移除底部 border-bottom"
      empty_state:
        - "icon 使用参考设计的机器人头像风格（圆角矩形 teal 渐变背景）"
        - "欢迎文案更新为医小管品牌"
        - "快捷问题 chips 保持现有功能，样式对齐参考设计（圆角 pill + icon）"
      message_bubbles:
        - "AI 气泡：白色底 + 左上小圆角 (4px 18px 18px 18px) — 已实现，确认保持"
        - "用户气泡：teal 渐变 + 右下小圆角 — 已实现，确认保持"
        - "AI 头像：teal 渐变圆形 + Bot icon — 已实现，确认保持"
      sources_card:
        - "来源引用区域样式升级：白色半透明背景 → 实色白底 + 轻阴影"
        - "来源条目增加右箭头 icon 暗示可点击"
      input_area:
        - "输入框保持 pill 形状"
        - "移除 input-area 的 border-top 分割线（No-Line Rule）"
        - "背景改为 surface 色调过渡"
      message_list_bg:
        - "消息列表背景从 #e1e7e6 渐变改为更浅的 surface 色调"
    verification:
      L0: "TypeScript 编译无错误"
      L1: "H5 预览：空状态显示医小管欢迎语 + 快捷chips"
      L2: "发送问题后 AI 回复气泡正常渲染，来源引用可点击"

