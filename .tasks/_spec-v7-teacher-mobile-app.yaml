      - AC-14: "查看全部" 跳转到提问列表页

  # ────────────────────────────────────────────────────────────────

  - id: F-V7-04
    title: 页面转换 — 提问列表 + 提问详情
    priority: P0
    estimated_effort: 4-5h
    depends_on: [F-V7-02]
    phase: 1
    description: |
      转换 React Questions.tsx 和 QuestionDetail.tsx。
      QuestionDetail 是最核心最复杂的页面。

      === QuestionsView (pages/questions/index.vue) ===
      参考: React src/pages/Questions.tsx + Stitch question_list/screen.png
      
      - 顶部: TopAppBar("学生提问", 返回箭头, 搜索图标)
      - 筛选 Tab: 全部(28) | 待处理(3) | 处理中(5) | 已解决(20)
