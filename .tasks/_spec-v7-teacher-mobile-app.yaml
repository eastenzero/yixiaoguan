      - 右侧: 状态标签

      区块 B — 对话气泡 (4 种角色):
      
      1. 学生消息 (右对齐):
         - 背景: $primary, 圆角: 左上+左下+右下圆, 右上方角
         - 文字: $on-primary
         - 阴影: 带 primary 色调
      
      2. AI 回复 (左对齐):
         - 左侧: Bot 图标圆形头像 ($secondary-container 背景)
         - 背景: white, 带左侧红色竖条 (拒答时)
         - 普通回复无红色竖条
      
      3. 系统消息 (居中):
         - 药丸形 $surface-container 背景
         - Bell 图标 + "学生已呼叫老师 — 14:32"
      
      4. 教师消息 (左对齐，Phase 2 对接后使用):
