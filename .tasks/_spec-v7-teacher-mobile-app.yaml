# ===================================================================
# T1 执行建议
# ===================================================================

t1_notes: |
  1. Phase 1 是纯前端 UI 转换，不需要 165 服务器运行。
     可以在 Windows 本机用 npx uni -p h5 开发和验证。
  
  2. 转换时以 React 源代码为主要参考，Stitch 截图用于视觉校准。
     React 代码比 Stitch HTML 更准确（Stitch HTML 可能有不一致）。
  
  3. Tailwind 类名转 SCSS 的通用规则:
     - bg-xxx → background: $xxx
     - text-xxx → color: $xxx
     - rounded-xxx → border-radius: 对应值
     - p-4 → padding: 16px (或 32rpx)
     - gap-4 → gap: 16px
     - 布局类 (flex, grid, items-center 等) → 同名 CSS 属性
  
  4. UniApp 标签映射:
     - <div> → <view>
     - <span> / <p> / <h1~h6> → <text> 或 <view>
     - <img> → <image>
     - <input> → <input> (UniApp 原生)
     - <button> → <view> + @click (推荐) 或 <button>
     - <a> / <Link> → <navigator> 或 uni.navigateTo
  
  5. 头像图片: React 中使用 Google 外链，转换时改为本地占位图
     或使用文字头像（取姓名首字）。
  
  6. rpx 与 px: UniApp H5 模式下 rpx 和 px 都可用。
     建议统一用 px（与 React 原型一致），后续小程序编译时再考虑 rpx。

# ===================================================================
# 风险
# ===================================================================

risks:
  - id: RISK-V7-01
    description: |
      UniApp H5 模式下 backdrop-filter (毛玻璃) 的兼容性。
      iOS Safari 和 Chrome 都支持，但需要 -webkit- 前缀。
      缓解: 添加 -webkit-backdrop-filter 前缀，或降级为纯白半透明背景。
  - id: RISK-V7-02
    description: |
      Tailwind → SCSS 转换量大（~900 行 React TSX 中的类名），
      可能遗漏样式或转换不精确。
      缓解: 以 Stitch 截图为视觉基准逐页校对。
  - id: RISK-V7-03
    description: |
      Escalation API 的响应数据结构可能与前端 Mock 数据不完全匹配
      （如字段名、嵌套结构不同）。
      缓解: Phase 2 开始时先用 curl 或 Postman 调一遍 API，确认数据结构再对接。
  - id: RISK-V7-04
    description: |
      教师端知识库 CRUD 接口可能不存在（business-api 可能只有学生端查询接口）。
      缓解: F-V7-10 已预设了降级方案（保留 Mock + 输出缺失清单）。
