# ===================================================================
# 色彩系统映射 (React Tailwind v4 @theme → SCSS 变量)
# ===================================================================

color_mapping:
  description: |
    React index.css 中 @theme 定义的色彩需转为 SCSS 变量。
    以下是关键映射（完整映射见 React index.css）。

  primary_colors:
    $primary:                  "#702ae1"    # 品牌主色
    $primary-dim:              "#6411d5"    # 深主色
    $primary-container:        "#b28cff"    # 主色容器
    $primary-fixed-dim:        "#a67aff"    # 固定暗主色
    $on-primary:               "#f8f0ff"    # 主色上文字
    $on-primary-container:     "#2e006c"    # 主色容器上文字

  surface_colors:
    $surface:                  "#faf5fb"    # 基础背景
    $surface-container-lowest: "#ffffff"    # L0 最低层
    $surface-container-low:    "#f4eff5"    # L1 低层
    $surface-container:        "#ebe7ed"    # L2 标准层
    $surface-container-high:   "#e5e1e8"    # L3 高层
    $surface-container-highest: "#e0dbe3"   # L4 最高层

  text_colors:
    $on-surface:               "#2f2e32"    # 主文字（禁纯黑）
    $on-surface-variant:       "#5d5b5f"    # 辅助文字
    $outline:                  "#78767b"    # 边框
    $outline-variant:          "#afacb1"    # 浅边框

  semantic_colors:
    $error:                    "#b41340"    # 错误/紧急
    $error-dim:                "#a70138"
    $error-container:          "#f74b6d"
    $secondary:                "#7742a6"
    $secondary-container:      "#e6c5ff"
    $tertiary:                 "#9e3657"
    $tertiary-container:       "#ff8eac"

# ===================================================================
# 模块定义
# ===================================================================

modules:

  # ────────────────────────────────────────────────────────────────
  # Phase 1: UniApp 项目初始化 + React → UniApp 模板转换
  # ────────────────────────────────────────────────────────────────

  - id: F-V7-01
    title: 教师移动端 UniApp 项目初始化
    priority: P0
    estimated_effort: 2-3h
    depends_on: []
    phase: 1
    description: |
      在 apps/ 下创建 teacher-app UniApp 项目，复用学生端脚手架。

      === 执行步骤 ===

      1. 复制 apps/student-app/ 为 apps/teacher-app/
      2. 清理学生端业务代码:
         - 删除 src/pages/ 下所有学生端页面
         - 删除 src/components/ 下学生端专用组件
         - 删除 src/api/ 下学生端专用 API（保留 auth.ts）
         - 保留: utils/request.ts, stores/user.ts, stores/index.ts, styles/
      3. 修改 package.json:
         - name: "teacher-app"
         - 确认依赖与学生端一致（vue 3, @dcloudio/uni-app, sass 等）
      4. 创建 SCSS 色彩系统文件 src/styles/theme.scss:
         - 将 React index.css 中的 @theme 色彩映射为 SCSS 变量
         - 参考上方 color_mapping 部分
         - 确保所有 ~50 个 MD3 色彩令牌都有对应 SCSS 变量
      5. 创建全局样式 src/styles/global.scss:
         - 字体: Manrope + PingFang SC + Microsoft YaHei
         - 基础 reset
         - 动画 keyframes (fadeUp, 阶梯延迟类)
         - 工具类: .no-scrollbar, .line-clamp-1, .line-clamp-2, .pb-safe
      6. 配置 pages.json (空壳，页面在后续模块填充):
         - 全局样式配置
         - "custom" tabBar 声明
      7. 配置 vite.config.ts:
         - 代理: /api/* → 192.168.100.165:8080
         - host: true (LAN 访问)
      8. 确认 `npx uni -p h5` 可以启动空项目

    files_to_create:
      - apps/teacher-app/package.json
      - apps/teacher-app/vite.config.ts
      - apps/teacher-app/src/styles/theme.scss
      - apps/teacher-app/src/styles/global.scss
      - apps/teacher-app/src/pages.json
      - apps/teacher-app/src/manifest.json

    files_to_copy_from_student:
      - src/utils/request.ts
      - src/stores/user.ts
      - src/stores/index.ts
      - src/api/auth.ts
      - src/env.d.ts
      - src/App.vue
      - src/main.ts
      - tsconfig.json
      - index.html

    acceptance_criteria:
      - AC-01: apps/teacher-app/ 目录存在
      - AC-02: package.json name 为 teacher-app
      - AC-03: src/styles/theme.scss 包含 ≥ 40 个 SCSS 色彩变量
      - AC-04: npx uni -p h5 可成功启动（无报错，显示空白页即可）
      - AC-05: 代理配置正确（/api/* 指向 165:8080）

  # ────────────────────────────────────────────────────────────────

  - id: F-V7-02
    title: 公共组件转换 (TopAppBar + BottomNavBar + 图标)
    priority: P0
    estimated_effort: 3-4h
    depends_on: [F-V7-01]
    phase: 1
    description: |
      将 React TopBar.tsx 和 BottomNav.tsx 转换为 UniApp Vue 3 组件，
      并创建教师端需要的 SVG 图标组件。

      === TopAppBar.vue ===
      参考: React src/components/TopBar.tsx
      转换要点:
      - JSX → <template> + <view>/<text>
      - useNavigate() → uni.navigateBack()
      - Lucide icons → 内联 SVG 组件
      - Tailwind 类名 → SCSS (使用 theme.scss 变量)
      - Props: title, showBack, action ('search'|'settings'|'add'|'edit'|'none')
      视觉规格:
      - 毛玻璃: backdrop-filter: blur(20px); background: rgba(255,255,255,0.8)
      - 高度: 44px (uni-app 建议) 或 56px
      - fixed 定位

      === BottomNavBar.vue (Custom TabBar) ===
      参考: React src/components/BottomNav.tsx
      转换要点:
      - 4 Tab: 工作台(/pages/dashboard/index), 学生提问(/pages/questions/index),
        知识库(/pages/knowledge/index), 我的(/pages/profile/index)
      - "学生提问" Tab 右上角红色数字徽章
      - 激活态: 图标填充 + 主色文字 + 底部小圆点
      - 毛玻璃背景
      - safe-area-inset-bottom 适配
      视觉规格:
      - 参考 React BottomNav.tsx 的样式：rounded-t-3xl, shadow
      - 激活态图标 strokeWidth 2.5, fill currentColor

      === 图标组件 ===
      在 src/components/icons/ 下创建以下 SVG 图标组件
      （参考学生端 icons/ 模式，每个图标一个 .vue 文件）:
      
      教师端需要的图标清单（从 React Lucide 用量提取）:
      - IconDashboard (LayoutDashboard)
      - IconMessage (MessageSquare)
      - IconBook (BookOpen)
      - IconUser (User)
      - IconBell (Bell)
      - IconPlus (PlusCircle)
      - IconMegaphone (Megaphone)
      - IconChart (BarChart2)
      - IconSettings (Settings)
      - IconAlert (AlertCircle)
      - IconCheck (CheckCircle2)
      - IconArrowRight (ArrowRight)
      - IconArrowLeft (ArrowLeft)
      - IconSearch (Search)
      - IconBrain (BrainCircuit)
      - IconBot (Bot)
      - IconLock (Lock)
      - IconEye (Eye)
      - IconInfo (Info)
      - IconLogout (LogOut)
      - IconChevronRight (ChevronRight)
      - IconEdit (Edit2)
      - IconVolume (Volume2)
      - IconGraduationCap (GraduationCap)
      - IconQrCode (QrCode)
      - IconFingerprint (Fingerprint)
      - IconUserCheck (UserCheck)

      每个图标组件 Props: size (默认 24), color (默认 currentColor)

    files_to_create:
      - apps/teacher-app/src/components/TopAppBar.vue
      - apps/teacher-app/src/components/BottomNavBar.vue
      - apps/teacher-app/src/components/icons/*.vue (27 个图标)

    acceptance_criteria:
      - AC-06: TopAppBar 渲染正确，showBack 时显示返回箭头
      - AC-07: BottomNavBar 4 个 Tab 可点击切换，激活态样式正确
      - AC-08: 徽章数字显示在"学生提问"Tab 上
      - AC-09: 所有 27 个图标组件可正常渲染

  # ────────────────────────────────────────────────────────────────

  - id: F-V7-03
    title: 页面转换 — 登录页 + 工作台
    priority: P0
    estimated_effort: 3-4h
    depends_on: [F-V7-02]
    phase: 1
    description: |
