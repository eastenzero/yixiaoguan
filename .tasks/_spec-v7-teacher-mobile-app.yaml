      - 处理中状态: 输入框 + 发送按钮（类似聊天输入）
      - 已解决状态: 解决信息文字

      Mock 行为: 点击"接单处理" → 按钮变为输入框模式

      注意: 此页面无 BottomNavBar（底部是操作区）

    files_to_create:
