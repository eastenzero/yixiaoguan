# ===================================================================
# 医小管 (YiXiaoGuan) — T0 架构师需求规格: 登录认证修复 + 用户数据生成
# 日期: 2026-04-05
# 作者: T0 Architect (Cascade)
# 状态: ready_for_t1
# 前置: spec-v3 completed; 165 服务器全量部署完成
# ===================================================================
#
# 背景摘要:
#   165 服务器已完成全量部署（PostgreSQL/Redis/Spring Boot/ai-service/student-app），
#   但学生端登录失败——所有账号均报"用户不存在"或"密码错误"。
#   原因是数据生成脚本（generate_user_data.py）存在三个致命 Bug，
#   且原计划的"模拟账号生成阶段"在迁移过程中丢失、质量也不达标。
#   本 spec 从头重做用户数据生成全流程，彻底修复登录阻塞。
#
# 阻塞影响:
#   - 学生端：完全不可用（无法登录）
#   - 教师端：若走 yx_user 认证链，同样不可用
#   - AI 对话、事务导办等所有业务功能：全部被登录阻塞
#   - 这是地基级 Bug，优先级最高
#
# 约束:
#   - 不修改后端 Java 代码（认证链路正确，问题在数据层）
#   - 不修改前端代码（前端登录逻辑正确）
#   - 密码必须在 INSERT 前由 Python bcrypt 库预先哈希（不依赖"后端自动加密"）
#   - 生成的 SQL 必须对齐 yx_schema.sql 的 yx_user 表定义
#   - 165 服务器执行 SQL 后需端到端验证
# ===================================================================

project: 医小管 (YiXiaoGuan)
version: spec-bugfix-login-userdata
date: 2026-04-05
author: T0-Architect
status: completed  # T0 验收通过 2026-04-06, PASS 11/11, L3 H5 实机人工验证成功
