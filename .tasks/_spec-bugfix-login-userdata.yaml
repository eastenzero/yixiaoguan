    tasks: [FIX-0]
    name: "前置：验证码关闭"
    rationale: "不关闭验证码则后续端到端验证无法进行"
    executor: "人工 SSH 或 remote_exec.py"

  phase_1:
    tasks: [FIX-1, FIX-2]
    name: "脚本修复"
    rationale: "可并行，FIX-1 和 FIX-2 修改不同文件"
    executor: "T3 (Kimi CLI 或本地)"

  phase_2:
