# ===================================================================
# 执行顺序
# ===================================================================
execution_order:
  batch1_parallel:
    - F-V5F-01 (页码标注, 纯数据, 无代码依赖)
    - F-V5F-03 (裁剪 API, AI service, 无前置依赖)
  batch2:
    - F-V5F-02 (入库+API透传, 依赖 F-V5F-01 的 frontmatter)
  batch3:
    - F-V5F-04 (前端对接, 依赖 F-V5F-02 + F-V5F-03)
  post:
    - 重新执行 batch_ingest_kb.py 入库（更新 ChromaDB metadata）
    - docker compose 重建 ai-service（新增 pypdf + materials 路由）

# ===================================================================
# T1 分工建议
# ===================================================================
t1_assignment:
  T1-A:
    modules: [F-V5F-01]
    scope: 页码标注（脚本或手工）
    effort: 2h
  T1-B:
    modules: [F-V5F-02, F-V5F-03, F-V5F-04]
    scope: 后端裁剪 API + API 透传 + 前端对接
    effort: 4h
  note: |
    T1-A 和 T1-B batch1 可并行（F-V5F-01 改 .md 文件, F-V5F-03 改 AI service）。
    F-V5F-02 需要 F-V5F-01 的 frontmatter 完成后才能验证。
    F-V5F-04 需要 F-V5F-02 + F-V5F-03 都完成。
    最后需要重新入库 + 重建容器。

# ===================================================================
# 风险
# ===================================================================
risks:
  - id: RISK-1
    description: |
      MinerU 逻辑页 vs PDF 物理页偏移:
      content_list_v2.json 有 122 页，PDF 有 182 页。
      MinerU 可能跳过纯图片页、空白页、封面等。
      解决: 脚本输出映射报告，人工抽查验证。
      如果偏移不可忽略，则改用手工标注方案。
  - id: RISK-2
    description: |
      pypdf 处理 120MB PDF 的内存和延迟:
      PdfReader 首次加载 120MB 文件可能需要 1-2 秒。
      解决: 内存缓存切片结果；PdfReader 可复用（单例模式）。
  - id: RISK-3
    description: |
      H5 web-view 加载 API URL（非静态文件）:
      裁剪 API 返回二进制 PDF，web-view 的 src 需要是完整 URL。
      解决: 使用绝对 URL（如 http://192.168.100.165/api/materials/slice?...）
      或相对 URL（/api/materials/slice?...），取决于 web-view 的 base URL 行为。
      如有问题，可将 API URL 改为 Blob URL。
