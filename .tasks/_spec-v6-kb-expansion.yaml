# ===================================================================
#
# 背景:
#   通过三轮 Kimi 探查（R1 公开搜索 + R2 深度搜索 + R3 Agent Browser
#   登录教务系统），共产出 7 份报告、~1650 行原始素材。
#   涵盖教务系统内部菜单/作息时间/规章制度、信息门户/企业微信功能、
#   招生就业、学生服务、图书馆/IT 服务等。
#
#   现有知识库: ~126 条 (first-batch-drafts/)
#   目标: 利用 7 份报告素材，新增 ~100-150 条 KB 条目，
#         使知识库从 126 条扩充至 250+ 条。
#
# 素材文件:
#   kimi/report-1-jwc-academic.md     — 教务处公开数据 (166行)
#   kimi/report-2-student-life.md     — 学生服务 (185行)
#   kimi/report-3-admissions-employment.md — 招生就业 (160行)
#   kimi/report-4-it-library.md       — 信息化/图书馆 (177行)
#   kimi/report-5-portal-features.md  — 信息门户/企业微信 (295行)
#   kimi/report-6-jwc-login-explore.md — 教务系统技术分析 (290行)
#   kimi/report-7-jwc-browser-explore.md — 教务系统内部登录后 (373行)
#
# 已关闭的前序 spec:
#   spec-v5e: CLOSED ✅
#   spec-v5f: pdf-page-slice (独立)
#
# ===================================================================

project: 医小管 (YiXiaoGuan)
version: spec-v6
date: 2026-04-09
author: T0-Architect
status: ready_for_t1

# ===================================================================
# 整体策略
# ===================================================================
#
# 1. 用 Kimi CLI 从 7 份报告批量生成 KB 条目（分 4 批次，按优先级）
# 2. 每批次生成后做质量审查 + 去重（对比现有 126 条）
# 3. 全部通过后执行 ChromaDB 全量重入库
# 4. 更新评测集并跑回归验证
#
# 命名规范: KB-20260409-NNNN (从 0001 开始，四位补零)
# 文件位置: knowledge-base/entries/first-batch-drafts/
# 格式: YAML frontmatter + Markdown 正文
#
# ===================================================================

# ===================================================================
# KB 条目模板（所有新条目必须遵循）
# ===================================================================
#
# ---
# title: "条目标题"
# category: "分类"           # 见下方 category 枚举
# tags: ["标签1", "标签2"]
# source: "kimi/report-N"   # 数据来源报告编号
# source_url: ""             # 如有原始 URL
# campus: ""                 # 泰安/济南/通用
# status: "draft"
# ---
#
# ## 问题概述
# 学生可能会问的问题（自然语言）
#
# ## 标准答复
# 简洁、准确的答案（1-3 段）
#
# ## 详细说明（可选）
# 更详细的流程、条件、注意事项
#
# ## 办理流程（如适用）
# 1. 步骤一
# 2. 步骤二
#
# ## 咨询方式（如有）
# - 电话: xxx
# - 地址: xxx
#
# ## 来源说明
# - 数据来源: kimi/report-N 第 X 节
#
# ===================================================================

# ===================================================================
# category 枚举（复用现有 + 新增）
# ===================================================================
#
# 现有:
#   - 入学与学籍
#   - 奖助贷补
#   - 就业与毕业
#   - 心理与测评
#   - 竞赛与第二课堂
#   - 证件与校园服务
#   - 事务申请与审批
#   - 学院通知与常见流程
#   - 生活服务（KB-0150 系列已用）
#
# 新增:
#   - 教务与课程        # 教务系统、选课、课表、成绩、考试
#   - 信息化服务        # 信息门户、企业微信、校园网、VPN
#   - 图书馆            # 借阅、自习室、数据库
#   - 学校概况          # 校区介绍、院系、学科
#   - 招生与深造        # 招生政策、考研、保研
#
# ===================================================================

modules:

  # ════════════════════════════════════════════════════════════════
  # PHASE 1: KB 条目批量生成（Kimi CLI）
  # ════════════════════════════════════════════════════════════════

  # ────────────────────────────────────────────────────────────────
  # BATCH-P0: 高频刚需条目（最高优先级）
  # ────────────────────────────────────────────────────────────────
  - id: BATCH-P0
    title: "P0 高频刚需 — 作息/电话/门户/校园网/一卡通/图书馆/报修/企微"
    priority: P0
    estimated_effort: 2h
    depends_on: []
    description: |
      使用 Kimi CLI 从指定报告中提取并生成 KB 条目。
      这是学生最高频咨询的内容，必须首批入库。

      === 生成清单 ===

      1. 作息时间表 (Report 7 §3.8)
         - KB-20260409-0001: 上课时间表（全 21 时段详细列表）
         - KB-20260409-0002: 学期周次与校历说明
         编号范围: 0001-0002

      2. 服务电话汇总 (Report 2 DS-1, Report 4, Report 5)
         - 按部门拆分: 教务处/学工部/后勤/网络中心/图书馆/心理中心/保卫处/医院...
         - 区分泰安校区和济南校区
         编号范围: 0003-0012 (约 10 条)

      3. 信息门户操作 (Report 5 §模块1-2, §模块5-6)
         - KB: 信息门户账号激活流程
         - KB: 信息门户密码重置
         - KB: 统一身份认证说明
         - KB: 企业微信绑定与使用
         编号范围: 0013-0018 (约 6 条)

      4. 校园网/WiFi/VPN (Report 4 DS-5, DS-11)
         - KB: 校园网开通与缴费
         - KB: WiFi 连接指南 (各校区)
         - KB: VPN 远程访问设置
         编号范围: 0019-0023 (约 5 条)

      5. 校园一卡通 (Report 4 DS-10)
         - KB: 一卡通功能与使用
         - KB: 一卡通充值方式
         - KB: 一卡通挂失与补办
         编号范围: 0024-0026 (约 3 条)

      6. 图书馆 (Report 4 DS-7/DS-8)
         - KB: 图书馆开馆时间 (各馆)
         - KB: 借阅规则与续借
         - KB: 24小时自习室
         - KB: 图书馆电子资源 (数据库/远程访问)
         - KB: 座位预约系统
         编号范围: 0027-0032 (约 6 条)

      7. 网上报修 (Report 5 §模块2)
         - KB: 宿舍报修流程 (网上报修系统)
         编号范围: 0033 (1 条, 注意与 KB-0151 去重)

      8. 企业微信功能导览 (Report 5 §企微应用列表)
         - KB: 企业微信主要功能一览
         编号范围: 0034-0035 (约 2 条)

      === 预估: ~35 条 ===
      === 编号范围: KB-20260409-0001 ~ KB-20260409-0035 ===

    source_reports:
      - kimi/report-2-student-life.md
      - kimi/report-4-it-library.md
      - kimi/report-5-portal-features.md
      - kimi/report-7-jwc-browser-explore.md

    output_dir: knowledge-base/entries/first-batch-drafts/
    naming: "KB-20260409-{NNNN}.md"
    id_range: "0001-0035"

    acceptance_criteria:
      - AC-P0-01: 生成 30-35 个 .md 文件，命名符合 KB-20260409-NNNN 格式
      - AC-P0-02: 每个文件都有合法 YAML frontmatter (title, category, tags, source)
      - AC-P0-03: 作息时间表条目包含完整 21 个时段
      - AC-P0-04: 服务电话条目区分泰安/济南校区
      - AC-P0-05: 与现有 KB-0150~0171 无实质内容重复（标题可类似但内容必须互补或更详细）

  # ────────────────────────────────────────────────────────────────
  # BATCH-P1: 教务核心
  # ────────────────────────────────────────────────────────────────
  - id: BATCH-P1
    title: "P1 教务核心 — 教务系统/选课/成绩/考试/学分/培养方案"
