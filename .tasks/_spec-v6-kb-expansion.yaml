      6. 接诉即办 (Report 5 §模块3)
         - KB: 投诉建议渠道与处理流程
         编号范围: 0065

      7. 学籍异动 (Report 7 菜单项)
         - KB: 休学/复学/转专业申请流程
         - KB: 学籍异动类型与条件
         编号范围: 0066-0067

      8. 人脸/证件照采集 (Report 5 §模块6)
         - KB: 人脸采集与证件照上传规范
         编号范围: 0068

      === 预估: ~13 条（去重后可能 10 条）===
      === 编号范围: KB-20260409-0056 ~ KB-20260409-0068 ===

    source_reports:
      - kimi/report-2-student-life.md
      - kimi/report-3-admissions-employment.md
      - kimi/report-5-portal-features.md
      - kimi/report-7-jwc-browser-explore.md

    output_dir: knowledge-base/entries/first-batch-drafts/
    naming: "KB-20260409-{NNNN}.md"
    id_range: "0056-0068"

    dedup_check_against:
      - KB-0150-电费缴纳指南.md
      - KB-0151-宿舍报修流程.md
      - KB-0152-校园卡办理与使用.md
      - KB-0154-学生公寓管理规定.md
      - KB-0156-奖学金评定指南.md
      - KB-0159-学籍管理规定.md
      - KB-0161-勤工助学指南.md
      - KB-0162-困难认定与助学金申请.md
      - KB-0164-学费缴纳指南.md
      - KB-0167-心理健康教育与咨询.md
      - KB-0169-学生证件管理.md
      - KB-0171-绿色通道与学费减免.md

    acceptance_criteria:
      - AC-P2-01: 生成 10-15 个 .md 文件
      - AC-P2-02: 毕业离校条目包含完整 8 环节步骤
      - AC-P2-03: 每个新条目与 dedup_check_against 列表无实质重复
      - AC-P2-04: 如有增量信息补充已有条目，在来源说明中注明

  # ────────────────────────────────────────────────────────────────
