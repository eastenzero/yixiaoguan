      === 编号范围: KB-20260409-0069 ~ KB-20260409-0084 ===

    source_reports:
      - kimi/report-1-jwc-academic.md
      - kimi/report-3-admissions-employment.md
      - kimi/report-4-it-library.md
      - kimi/report-5-portal-features.md
