      === 生成清单 ===

      1. 教务系统导览 (Report 7 §2)
         - KB: 教务系统登录与功能总览（25 个模块简介）
         - KB: 教务系统常见问题（登录失败/忘记密码等）
         编号范围: 0036-0037

      2. 选课相关 (Report 7 §3.7, §5.3)
