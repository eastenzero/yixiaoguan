      === 预估: ~20 条 ===
      === 编号范围: KB-20260409-0036 ~ KB-20260409-0055 ===

    source_reports:
      - kimi/report-1-jwc-academic.md
      - kimi/report-7-jwc-browser-explore.md

    output_dir: knowledge-base/entries/first-batch-drafts/
    naming: "KB-20260409-{NNNN}.md"
    id_range: "0036-0055"

    acceptance_criteria:
      - AC-P1-01: 生成 18-22 个 .md 文件
      - AC-P1-02: 缓考申请条目包含完整审批链（学生→任课教师→管理员）
      - AC-P1-03: 选课条目包含 14 个课组分类
      - AC-P1-04: 教务系统导览条目包含完整 25 个菜单项

  # ────────────────────────────────────────────────────────────────
  # BATCH-P2: 学生权益与生活
  # ────────────────────────────────────────────────────────────────
  - id: BATCH-P2
    title: "P2 学生权益 — 奖助贷/宿舍/毕业离校/学费/心理/投诉"
    priority: P2
    estimated_effort: 1.5h
    depends_on: [BATCH-P0]
    description: |
      从 Report 2 (学生服务)、Report 3 (招生就业)、Report 5 (门户) 生成。
      注意: 现有 KB-0150~0171 已覆盖部分生活服务，本批次需先做去重检查。

      === 去重规则 ===
      对照现有条目，如内容已充分覆盖则跳过；如新素材有增量信息（如新增
      联系方式、更详细流程、区分校区），则生成补充条目并在 title 中标注。

      === 生成清单 ===

      1. 奖助学金补充 (Report 2 DS-2)
