    id_range: "0069-0084"

    acceptance_criteria:
      - AC-P3-01: 生成 14-18 个 .md 文件
      - AC-P3-02: 学校简介条目包含校区信息
      - AC-P3-03: 网上服务大厅条目列出主要服务分类

  # ════════════════════════════════════════════════════════════════
  # PHASE 2: 质量审查与去重
  # ════════════════════════════════════════════════════════════════

  - id: QA-REVIEW
    title: "质量审查 — frontmatter 校验 + 去重 + 内容质量"
    priority: P1
    estimated_effort: 1h
    depends_on: [BATCH-P0, BATCH-P1, BATCH-P2, BATCH-P3]
    description: |
      对所有新生成的 KB-20260409-* 文件进行质量审查。

      === 检查项 ===

      1. frontmatter 完整性:
         - 每个文件必须有 title, category, tags, source, status
         - category 必须在枚举列表中
         - tags 至少 2 个

      2. 内容质量:
         - 不为空/不是模板占位符
         - "标准答复"段落存在且不少于 50 字
         - 无明显幻觉内容（如编造不存在的电话号码）
         - 信息可追溯到源报告

      3. 去重检查:
         - 新增条目之间无重复（标题相似度 > 80%）
         - 与现有 KB-0150~0171 和 KB-20260324-* 无实质重复
         - 如有重叠，合并或删除低质量版本

      4. 编号连续性:
         - KB-20260409-0001 到最后一个编号连续无跳号

      === 输出 ===
      生成审查报告: kimi/qa-review-report.md
      包含: 通过/不通过/需修改 三种状态的条目列表

    acceptance_criteria:
      - AC-QA-01: 审查报告存在且覆盖所有新条目
      - AC-QA-02: frontmatter 校验 100% 通过
      - AC-QA-03: 无重复条目（标题+内容均不重复）
      - AC-QA-04: 编号连续无跳号

  # ════════════════════════════════════════════════════════════════
  # PHASE 3: ChromaDB 入库
  # ════════════════════════════════════════════════════════════════

  - id: INGEST
    title: "ChromaDB 全量重入库"
    priority: P0
    estimated_effort: 0.5h
    depends_on: [QA-REVIEW]
    description: |
      QA 通过后，在 165 服务器上执行全量重入库。

      === 步骤 ===

      1. 确保所有新 KB 文件已同步到 165 (Mutagen)
      2. 停止 ai-service (tmux ai-service)
      3. 清空 ChromaDB 旧数据
      4. 执行全量入库:
         cd ~/dev/yixiaoguan/services/ai-service
         python scripts/batch_ingestion.py --yes
      5. 验证入库数量 ≥ 目标值
      6. 重启 ai-service
      7. GET /kb/stats 确认 entry_count

      === 预期 ===
      入库总量: 现有 ~126 + 新增 ~84 = ~210+ 条
      chunks: ~300+ (按 800 字/chunk)

    acceptance_criteria:
      - AC-ING-01: batch_ingestion.py 运行无 Python 异常
      - AC-ING-02: /kb/stats entry_count ≥ 200
      - AC-ING-03: 抽查 5 条新入库的 KB-20260409-* 条目，metadata 包含 entry_id/category/title

  # ════════════════════════════════════════════════════════════════
  # PHASE 4: RAG 回归验证
  # ════════════════════════════════════════════════════════════════

  - id: RAG-EVAL
    title: "RAG 评测 — 扩充评测集 + 回归测试"
    priority: P1
    estimated_effort: 1h
    depends_on: [INGEST]
    description: |
      入库完成后验证 RAG 召回质量未退化，且新条目可被正确召回。

      === 步骤 ===

      1. 扩充评测集 (eval-set-v1.yaml):
         新增 10-15 个测试问题覆盖新入库主题:
         - "上午第三四节课几点上课？" → 期望命中作息时间表
         - "怎么连校园WiFi？" → 期望命中校园网条目
         - "缓考怎么申请？" → 期望命中缓考流程
         - "毕业离校要走哪些手续？" → 期望命中毕业离校条目
         - "教务系统怎么登录？" → 期望命中教务系统导览
         - "怎么报修宿舍设施？" → 期望命中网上报修
         - "信息门户密码忘了怎么办？" → 期望命中密码重置
         - "图书馆几点开门？" → 期望命中图书馆开馆
         - "一卡通丢了怎么办？" → 期望命中一卡通补办
         - "学分互认怎么申请？" → 期望命中学分互认

      2. 跑评测:
         python scripts/run_eval.py
         - Recall@5 ≥ 85% (允许新题略低于旧题)
         - 拒答准确率保持 100%
         - 旧题 Recall 不退化

      === 回归基线 ===
      当前: Recall@5 = 92.86%, 拒答 = 100% (32 题)

    acceptance_criteria:
      - AC-EVAL-01: 评测集扩充至 42-47 题
      - AC-EVAL-02: 整体 Recall@5 ≥ 85%
      - AC-EVAL-03: 原 32 题 Recall 不低于 90%（不退化）
      - AC-EVAL-04: 拒答准确率 = 100%

