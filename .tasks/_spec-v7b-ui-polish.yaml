  - batch-2: [F-V7B-02, F-V7B-03]          # Teacher App 视觉 (2.5h)
  - batch-3: [F-V7B-04]                    # Student App 色彩统一 (1.5h)
  - batch-4: [F-V7B-05, F-V7B-06]          # Student App 图标+阴影 (2h)

