# ===================================================================
# 云服务器 (60.205.205.99) Nginx 反向代理配置
# 用途: 公网访问内网 165 服务器的前端应用
# 内网穿透: EasyTier, 165 VPN IP = 10.77.0.10
# ===================================================================
#
# 访问地址:
#   学生端: http://60.205.205.99:8174
#   教师端: http://60.205.205.99:8173
#
# 165 上的 Vite dev server 自带 API proxy，
# 所以这里只需要做纯反向代理即可，无需额外 API 路由。
# ===================================================================

# ── 学生端 (student-app, Vite dev :5174) ──
server {
    listen 8174;
    server_name _;

    # 文件上传 / PDF 等大文件
    client_max_body_size 50m;

    location / {
        proxy_pass http://10.77.0.10:5174;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Vite HMR 热更新)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE 流式响应 (AI 对话)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# ── 教师端 (teacher-web, Vite dev :5173) ──
server {
    listen 8173;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://10.77.0.10:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Vite HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
