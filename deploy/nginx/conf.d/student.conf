server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html/student;
    index index.html;

    # 文件上传大小限制
    client_max_body_size 20m;

    # ── 1. RuoYi 认证路由（无 /api 前缀，需 strip /api）──
    # 必须放在通用 /api 规则之前，否则会被通用规则先匹配
    location ~ ^/api/(login|logout|captchaImage|getInfo) {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://business-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 2. AI 服务（必须在通用 /api 之前）──
    # SSE 流式响应需要特殊配置
    location /api/chat {
        proxy_pass http://ai-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE 必需配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── 3. 业务后端（通用规则，路径不变）──
    location /api/ {
        proxy_pass http://business-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 4. 静态文件 + SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
