# 医小管 — 全栈部署 Docker Compose
# 包含：PostgreSQL + Redis + business-api + ai-service + Nginx
# 启动命令：docker compose up -d

version: "3.9"

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yixiaoguan}
      POSTGRES_USER: ${POSTGRES_USER:-yx_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_dotenv}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yx_admin} -d ${POSTGRES_DB:-yixiaoguan}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_dotenv} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_dotenv}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── business-api（若依 Spring Boot）────────────────────────────
  business-api:
    build:
      context: ../services/business-api
      dockerfile: Dockerfile
    container_name: yx_business_api
    restart: unless-stopped
    environment:
      # 覆盖 application-druid.yml 中的 localhost（RISK-2）
      SPRING_DATASOURCE_DRUID_MASTER_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-yixiaoguan}
      SPRING_DATASOURCE_DRUID_MASTER_USERNAME: ${POSTGRES_USER:-yx_admin}
      SPRING_DATASOURCE_DRUID_MASTER_PASSWORD: ${POSTGRES_PASSWORD}
      # 覆盖 application.yml 中的 spring.data.redis.host: localhost
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
      - backend_upload:/app/uploadPath
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/captchaImage || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── AI Service（FastAPI + ChromaDB）───────────────────────────
  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: Dockerfile
    container_name: yx_ai_service
    restart: unless-stopped
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_CHAT_MODEL: ${DASHSCOPE_CHAT_MODEL:-qwen-plus}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v3}
      CHROMA_PERSIST_DIR: /app/data/chroma
      BUSINESS_API_BASE_URL: http://business-api:8080
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ../services/ai-service/data/chroma:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      business-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Nginx（前端静态资源 + 反向代理）─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: yx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../apps/student-app/dist/build/h5:/usr/share/nginx/html/student:ro
      - ../apps/teacher-web/dist:/usr/share/nginx/html/teacher:ro
    depends_on:
      business-api:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_upload:
    driver: local
